name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Run shellcheck on all shell scripts
        run: |
          set -e
          # setup.sh is excluded: the legacy installer is being replaced in
          # Task 9 of the dotfile-install refactor. Remove this exclusion
          # once the new setup.sh lands (it will be shellcheck-clean).
          find . -name '*.sh' -not -path './tests/*' -not -name 'setup.sh' -print0 | xargs -0 shellcheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bats and jq
        run: sudo apt-get install -y bats jq
      - name: Run tests
        run: bats tests/
