# Mind-Lint file category manifest.
# Format: <glob>|<category>|<subtype>[|<target-relative-to-~/.claude/>]
#
# Categories:
#   1 - framework, symlinked into ~/.claude/
#   2 - template, copied on init, updatable via --sync
#   3 - seed, copied once, never updated
#
# Subtypes:
#   per-file  - each matching file gets its own symlink (allows user-added files alongside)
#   dir       - entire directory becomes a single symlink
#   copy      - copied as a regular file
#   seed      - copied once as a regular file; not re-seeded on update
#   claude-md - copied to ~/.claude/CLAUDE.md only if missing

# Category 1: symlinked framework (per-file)
commands/*.md|1|per-file
scripts/*.sh|1|per-file

# Category 1: symlinked framework (directory)
templates|1|dir
docs|1|dir

# Category 2: copied templates (overwritable via --sync)
templates/user-side/rules/workflows.md|2|copy|rules/workflows.md
templates/user-side/rules/boundaries.md|2|copy|rules/boundaries.md
templates/user-side/skills/code-review.md|2|copy|skills/code-review.md
templates/user-side/skills/content-creation.md|2|copy|skills/content-creation.md

# Category 3: seeded indexes (created if missing, never re-seeded)
templates/starter-indexes/memory/learnings/index.md|3|seed|memory/learnings/index.md
templates/starter-indexes/memory/decisions/index.md|3|seed|memory/decisions/index.md
templates/starter-indexes/memory/corrections/index.md|3|seed|memory/corrections/index.md
templates/starter-indexes/wiki/_index.md|3|seed|wiki/_index.md
templates/starter-indexes/wiki/_log.md|3|seed|wiki/_log.md
templates/starter-indexes/raw/_index.md|3|seed|raw/_index.md
templates/starter-indexes/content/_pipeline.md|3|seed|content/_pipeline.md

# Category 3: CLAUDE.md seed (only written if missing)
templates/claude-md/CLAUDE.md|3|claude-md|CLAUDE.md
